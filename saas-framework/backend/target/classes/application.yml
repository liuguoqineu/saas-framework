server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/saaslearn?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    property-naming-strategy: LOWER_CAMEL_CASE

mybatis-plus:
  configuration:
    # 日志输出，方便查看SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 逻辑删除字段名
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键自增策略
      id-type: auto

# JWT 配置
jwt:
  secret: saas-framework-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 7200000

# 文件上传配置（使用绝对路径，避免相对路径解析到Tomcat临时目录）
file:
  upload-path: G:/gongshixiangmu/saas框架/saas框架/saas-framework/uploads/

# springdoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.saas.framework: debug
