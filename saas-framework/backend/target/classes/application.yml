server:
  port: 8080

spring:
  datasource:
    # ========== 部署到服务器时修改以下配置 ==========
    url: jdbc:mysql://39.98.221.201:3306/saaslearn?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: wolf1234
    # ================================================
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    property-naming-strategy: LOWER_CAMEL_CASE

mybatis-plus:
  configuration:
    # 日志输出，生产环境建议改为 info 或关闭
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 逻辑删除字段名
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键自增策略
      id-type: auto

# JWT 配置（部署时请更换为更安全的密钥）
jwt:
  secret: saas-framework-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 7200000

# 文件上传/备份路径（服务器部署建议改为绝对路径）
file:
  upload-path: ./uploads/
  backup-path: ./backups/

# mysqldump 路径配置（解决自动备份失败问题）
mysqldump:
  path: C:/phpstudy_pro/Extensions/MySQL5.7.26/bin/mysqldump.exe

# springdoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.saas.framework: debug
  # ========== 服务器部署时取消注释以下配置，将日志写入文件 ==========
  # file:
  #   name: ./logs/saas-framework.log
  #   max-size: 50MB
  #   max-history: 30
  # pattern:
  #   file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  # ================================================================

# 日报/周报/月报系统配置
report:
  daily:
    deadline: "18:00"
    remind-before-minutes: 60
  weekly:
    start-day: 1
    deadline-day: 5
    deadline-time: "18:00"
  monthly:
    deadline-day: 3
    deadline-time: "18:00"
  approval:
    timeout-hours: 24
    max-level: 2
  overdue:
    remind-interval-hours: 2
    max-remind-count: 3
  export:
    max-batch-size: 500
